name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install FFmpeg when unavailable
        run: command -v ffmpeg >/dev/null || brew install ffmpeg

      - name: Run checks
        run: npm run check

      - name: Collect test coverage
        run: npm run test:coverage

      - name: Verify isolated plugin installation when Codex is available
        run: |
          if command -v codex >/dev/null; then
            npm run test:plugin-install
          else
            echo "Codex CLI unavailable; isolated installation remains a local release gate."
          fi

      - name: Check whitespace
        run: git diff --check
