name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install FFmpeg when unavailable
        run: command -v ffmpeg >/dev/null || brew install ffmpeg

      - name: Install pinned Codex CLI
        run: npm install --global @openai/codex@0.144.4

      - name: Run checks
        run: npm run check

      - name: Collect test coverage
        run: npm run test:coverage

      - name: Run official plugin validator
        run: |
          uv run --no-project --with pyyaml python "$HOME/.codex/skills/.system/plugin-creator/scripts/validate_plugin.py" plugins/codex-browser-recorder

      - name: Run official skill validator
        run: |
          uv run --no-project --with pyyaml python "$HOME/.codex/skills/.system/skill-creator/scripts/quick_validate.py" plugins/codex-browser-recorder/skills/record-browser

      - name: Verify isolated plugin installation
        run: npm run test:plugin-install

      - name: Verify release candidate
        run: npm run check:release-candidate

      - name: Check whitespace
        run: git show --check --format= HEAD

      - name: Check recording artifact residue
        env:
          RECORDING_ARTIFACT_PATTERN: '(^|/)([^/]+\.(webm|mp4|mov|mkv|part)|result\.json|recording-[^/]+/)'
        run: |
          if git ls-files --cached --others --exclude-standard | grep -Eq "$RECORDING_ARTIFACT_PATTERN"; then
            exit 1
          fi
