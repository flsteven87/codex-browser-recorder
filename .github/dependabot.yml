version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      codeql-actions:
        patterns:
          - "github/codeql-action/*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
