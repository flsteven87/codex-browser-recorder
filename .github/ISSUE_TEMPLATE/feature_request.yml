name: Feature request
description: Suggest a focused improvement to Browser Recorder.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the user need, not just the feature.
    validations:
      required: true
  - type: textarea
    id: benefit
    attributes:
      label: What would a good outcome look like?
      description: Explain the smallest useful result and who it helps.
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: What do you do today?
      description: Share any current workaround. Leave blank if there is none.
  - type: textarea
    id: proposal
    attributes:
      label: Suggested approach
      description: Optional. Describe an interaction or implementation idea if you have one.
  - type: checkboxes
    id: safety
    attributes:
      label: Before submitting
      options:
        - label: This request contains no recording or raw frames, private page content or URL, credential, token, personal data, local private path, or Browser/CDP diagnostic.
          required: true
