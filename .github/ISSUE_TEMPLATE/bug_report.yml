name: Bug report
description: Tell us what went wrong with a non-sensitive recording.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: symptom
    attributes:
      label: What happened?
      description: Describe the problem and the step that failed.
      placeholder: The setup check passed, but recording stopped after I clicked the link.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the result you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Use a public, logged-out test page or a loopback fixture. Do not include a private or signed URL.
      placeholder: |
        1. Run the setup check.
        2. Start a 5-second recording on a public test page.
        3. Click the first link.
    validations:
      required: true
  - type: input
    id: error_code
    attributes:
      label: Error code
      description: If one was shown, paste only the short code.
      placeholder: ffmpeg_missing
  - type: input
    id: revision
    attributes:
      label: Plugin version
      description: Provide the plugin version or commit SHA.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include macOS and Codex desktop versions. Add Chrome, extension, and redacted FFmpeg versions when relevant.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Before submitting
      options:
        - label: This report contains no recording or raw frames, private page content or URL, credential, token, personal data, local private path, or Browser/CDP diagnostic.
          required: true
        - label: This is not a security vulnerability. I will use private vulnerability reporting for security issues.
          required: true
